<!DOCTYPE html>

<html>
<head>
<title>Air Writing</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2,
        #6dd5ed
    );

    background-size:400% 400%;
    animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.box{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

h1{
    font-size:50px;
}

h2{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>✅ Login Successful</h1>

<h2>Air Writing Started</h2>

<p>Welcome to Air Writing System</p>

</div>

</body>
</html>
